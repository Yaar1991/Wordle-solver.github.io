<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Wordle Solver</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:          #0d0d0f;
  --surface:     #16161a;
  --border:      #2a2a30;
  --text:        #e8e8ec;
  --muted:       #6b6b7a;
  --accent:      #c8ff57;
  --accent2:     #57c8ff;
  --grey-tile:   #3a3a3c;
  --yellow-tile: #b59f3b;
  --green-tile:  #538d4e;
  --yellow-text: #f5d65b;
  --green-text:  #79c761;
  --mono: 'DM Mono', monospace;
  --head: 'Syne', sans-serif;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
  --safe-top:    env(safe-area-inset-top, 0px);

  /* Scale with screen: SE(375) → Pro Max(430) → tablet */
  --tab-h:    clamp(48px, 6.5vh, 58px);
  --header-h: clamp(42px, 5.5vh, 52px);
  --tile:     clamp(40px, 10.5vw, 52px);
  --tgap:     clamp(4px,  1.2vw,  7px);
  --kh:       clamp(36px, 5.2vh,  46px);
  --kgap:     clamp(4px,  1.2vw,  6px);
  --tile-fs:  clamp(16px, 4.5vw,  22px);
  --chip-fs:  clamp(13px, 3.8vw,  16px);
}

html, body {
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  color: var(--text);
  font-family: var(--mono);
  -webkit-text-size-adjust: 100%;
}

.shell {
  display: flex;
  flex-direction: column;
  height: 100%;
  height: 100dvh;
}

/* Header */
header {
  height: calc(var(--header-h) + var(--safe-top));
  padding: var(--safe-top) 16px 0;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
  background: var(--bg);
  z-index: 10;
}
header h1 {
  font-family: var(--head);
  font-size: 17px;
  font-weight: 800;
  color: var(--accent);
  white-space: nowrap;
}
.hdr-right { display: flex; align-items: center; gap: 10px; }
.hdr-count { font-size: 10px; color: var(--muted); white-space: nowrap; }
.hdr-reset {
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  padding: 4px 10px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}

/* Tab bar */
.tab-bar {
  display: flex;
  height: calc(var(--tab-h) + var(--safe-bottom));
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  background: var(--bg);
  padding-bottom: var(--safe-bottom);
  order: 999;
}
.tab-btn {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  background: transparent;
  border: none;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: 0.06em;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: color 0.15s;
  position: relative;
}
.tab-btn.active { color: var(--accent); }
.tab-btn .tab-icon { font-size: 18px; line-height: 1; }
.tab-badge {
  position: absolute;
  top: 4px;
  right: calc(50% - 18px);
  background: var(--accent);
  color: #000;
  font-size: 9px;
  font-weight: 700;
  min-width: 16px;
  height: 16px;
  border-radius: 99px;
  display: none;
  align-items: center;
  justify-content: center;
  padding: 0 4px;
}
.tab-badge.visible { display: flex; }

/* Panels */
.panels {
  flex: 1;
  overflow: hidden;
  position: relative;
  min-height: 0;
}
.panel {
  position: absolute;
  inset: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  display: none;
  flex-direction: column;
}
.panel.active { display: flex; }

/* Guess panel — never scrolls, everything fits */
.guess-panel {
  padding: 6px 12px 0;
  gap: 0;
  overflow: hidden;
  justify-content: space-between;
}

.instruction {
  font-size: 11px;
  color: var(--muted);
  text-align: center;
  padding: 3px 0;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  flex-shrink: 0;
}

/* Grid */
.grid {
  display: flex;
  flex-direction: column;
  gap: var(--tgap);
  align-items: center;
  padding: 5px 0;
  flex-shrink: 0;
}
.grid-row {
  display: flex;
  gap: var(--tgap);
  align-items: center;
  justify-content: center;
}
.tile {
  width: var(--tile);
  height: var(--tile);
  border: 2px solid var(--border);
  border-radius: 7px;
  background: var(--surface);
  color: var(--text);
  font-family: var(--mono);
  font-size: var(--tile-fs);
  font-weight: 500;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  user-select: none;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s, border-color 0.1s, transform 0.08s;
  flex-shrink: 0;
}
.tile:active { transform: scale(0.88); }
.tile[data-state="empty"]  { border-color: var(--border); background: var(--surface); color: var(--text); }
.tile[data-state="typing"] { border-color: #555; background: var(--surface); color: var(--text); }
.tile[data-state="grey"]   { border-color: var(--grey-tile);   background: var(--grey-tile);   color: #fff; }
.tile[data-state="yellow"] { border-color: var(--yellow-tile); background: var(--yellow-tile); color: #fff; }
.tile[data-state="green"]  { border-color: var(--green-tile);  background: var(--green-tile);  color: #fff; }

/* Row delete */
.row-delete {
  width: 24px; height: 24px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--muted);
  font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  -webkit-tap-highlight-color: transparent;
  transition: border-color 0.15s, color 0.15s, opacity 0.15s;
  opacity: 0;
}
.row-delete.has-content { opacity: 1; }
.row-delete:active { border-color: #ff6b57; color: #ff6b57; }

@keyframes shake {
  0%,100% { transform: translateX(0); }
  15%  { transform: translateX(-5px); }
  30%  { transform: translateX(5px); }
  45%  { transform: translateX(-4px); }
  60%  { transform: translateX(4px); }
  75%  { transform: translateX(-2px); }
  90%  { transform: translateX(2px); }
}
.row-shake { animation: shake 0.4s ease; }

/* Legend */
.legend {
  display: flex;
  justify-content: center;
  gap: 14px;
  padding: 2px 0;
  flex-shrink: 0;
}
.legend-item { display: flex; align-items: center; gap: 4px; font-size: 10px; color: var(--muted); }
.legend-dot { width: 9px; height: 9px; border-radius: 2px; flex-shrink: 0; }

/* Keyboard */
.keyboard {
  display: flex;
  flex-direction: column;
  gap: var(--kgap);
  padding: 4px 0;
  flex-shrink: 0;
}
.kb-row { display: flex; gap: var(--kgap); justify-content: center; }
.kb-key {
  height: var(--kh);
  flex: 1;
  max-width: 36px;
  border-radius: 6px;
  border: none;
  background: #404048;
  color: #fff;
  font-family: var(--mono);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: background 0.1s, opacity 0.1s;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.kb-key.wide { max-width: 50px; font-size: 10px; }
.kb-key:active { opacity: 0.7; }
.kb-key[data-ks="grey"]   { background: #3a3a3c; opacity: 0.45; }
.kb-key[data-ks="yellow"] { background: var(--yellow-tile); opacity: 1; }
.kb-key[data-ks="green"]  { background: var(--green-tile);  opacity: 1; }
.kb-key[data-ks="unused"] { background: #404048; opacity: 1; }

/* Submit */
.btn-submit {
  width: 100%;
  padding: 12px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #0d0d0f;
  font-family: var(--head);
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: opacity 0.15s, transform 0.1s;
  margin: 4px 0 6px;
  flex-shrink: 0;
}
.btn-submit:active { transform: scale(0.98); opacity: 0.9; }

/* Results panel */
.results-panel {
  padding: 14px;
  gap: 12px;
}
.results-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.results-count strong {
  color: var(--accent);
  font-size: 26px;
  font-family: var(--head);
  font-weight: 800;
}
.results-count span { font-size: 12px; color: var(--muted); margin-left: 4px; }
.copy-btn {
  padding: 8px 16px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 20px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
}
.copy-btn.copied { border-color: var(--accent); color: var(--accent); }

.sort-row { display: flex; gap: 6px; }
.sort-btn {
  flex: 1;
  padding: 9px 6px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 11px;
  cursor: pointer;
  -webkit-tap-highlight-color: transparent;
  transition: all 0.15s;
}
.sort-btn.active { background: rgba(200,255,87,0.1); border-color: var(--accent); color: var(--accent); }

/* Frequency */
.freq-box {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.freq-title {
  font-size: 10px;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--muted);
  display: flex;
  justify-content: space-between;
}
.freq-title span { text-transform: none; letter-spacing: 0; font-size: 10px; }
.freq-row { display: flex; align-items: center; gap: 8px; }
.freq-letter { width: 18px; font-size: 13px; font-weight: 500; text-align: center; flex-shrink: 0; }
.freq-bar-wrap { flex: 1; height: 6px; background: var(--border); border-radius: 99px; overflow: hidden; }
.freq-bar { height: 100%; border-radius: 99px; transition: width 0.3s ease; }
.freq-count { font-size: 10px; color: var(--muted); width: 30px; text-align: right; flex-shrink: 0; }
.freq-pct   { font-size: 10px; color: var(--muted); width: 32px; text-align: right; flex-shrink: 0; }
.freq-empty { font-size: 12px; color: var(--muted); text-align: center; padding: 4px 0; }

/* Word chips */
.word-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 8px;
  align-content: flex-start;
  padding-bottom: 16px;
}
.word-chip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-family: var(--mono);
  font-size: var(--chip-fs);
  letter-spacing: 0.06em;
  animation: fadeIn 0.18s ease both;
  min-width: 0;
}
.word-chip.chip-highlight {
  border-color: var(--accent);
  box-shadow: 0 0 0 1px #c8ff5750, 0 0 10px #c8ff5725;
  background: rgba(200,255,87,0.06);
}
.wl { color: var(--text); font-weight: 500; }
.wl.wg { color: var(--green-text); font-weight: 700; }
.wl.wy { color: var(--yellow-text); }
.word-letters { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.word-score { font-size: 10px; color: var(--muted); padding-left: 6px; border-left: 1px solid var(--border); white-space: nowrap; flex-shrink: 0; }

.empty-state {
  width: 100%;
  text-align: center;
  color: var(--muted);
  font-size: 13px;
  padding: 48px 0;
  line-height: 2.2;
}
.empty-state .big { font-size: 40px; display: block; margin-bottom: 8px; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(3px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* Desktop */
@media (min-width: 700px) {
  .shell { flex-direction: row; flex-wrap: wrap; }
  header { width: 100%; order: -1; }
  .tab-bar { display: none; }
  .panels { display: grid; grid-template-columns: 320px 1fr; flex: 1; overflow: hidden; }
  .panel { position: relative; display: flex !important; overflow-y: auto; }
  .guess-panel { border-right: 1px solid var(--border); overflow-y: auto; justify-content: flex-start; gap: 12px; padding: 16px; }
}
</style>
</head>
<body>
<div class="shell">

  <header>
    <h1>Wordle Solver</h1>
    <div class="hdr-right">
      <div class="hdr-count" id="wordCount">— words</div>
      <button class="hdr-reset" onclick="resetAll()">Reset</button>
    </div>
  </header>

  <div class="panels">

    <!-- GUESS panel -->
    <div class="panel guess-panel active" id="panelGuess">
      <p class="instruction">Tap a filled tile to cycle: ⬛ absent · 🟨 wrong spot · 🟩 correct</p>
      <div class="grid" id="grid"></div>
      <div class="legend">
        <div class="legend-item"><div class="legend-dot" style="background:var(--grey-tile)"></div>Absent</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--yellow-tile)"></div>Wrong spot</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--green-tile)"></div>Correct</div>
      </div>
      <div class="keyboard" id="keyboard"></div>
      <button class="btn-submit" onclick="submitRow()">Submit Guess →</button>
    </div>

    <!-- RESULTS panel -->
    <div class="panel results-panel" id="panelResults">
      <div class="results-header">
        <div class="results-count">
          <strong id="resultNum">—</strong><span id="resultLabel">words</span>
        </div>
        <button class="copy-btn" id="copyBtn" onclick="copyResults()">Copy list</button>
      </div>
      <div class="sort-row">
        <button class="sort-btn active" data-sort="alpha" onclick="setSort(this)">A → Z</button>
        <button class="sort-btn" data-sort="score-desc" onclick="setSort(this)">Score ↓</button>
        <button class="sort-btn" data-sort="score-asc" onclick="setSort(this)">Score ↑</button>
      </div>
      <div class="freq-box">
        <div class="freq-title">
          Best remaining letters
          <span id="freqSub">search first</span>
        </div>
        <div id="freqPanel"><div class="freq-empty">Appears after first guess</div></div>
      </div>
      <div class="word-grid" id="wordGrid">
        <div class="empty-state"><span class="big">🟩</span>Submit a guess to see matches</div>
      </div>
    </div>

  </div><!-- /panels -->

  <!-- Tab bar (mobile only) -->
  <nav class="tab-bar">
    <button class="tab-btn active" id="tabGuess" onclick="switchTab('Guess')">
      <span class="tab-icon">🟩</span>
      Guess
    </button>
    <button class="tab-btn" id="tabResults" onclick="switchTab('Results')">
      <span class="tab-icon">📋</span>
      Results
      <span class="tab-badge" id="resultBadge"></span>
    </button>
  </nav>

</div><!-- /shell -->

// ── Constants ──
const ROWS = 6, COLS = 5;
const KB_ROWS = [
  ['Q','W','E','R','T','Y','U','I','O','P'],
  ['A','S','D','F','G','H','J','K','L'],
  ['↵','Z','X','C','V','B','N','M','⌫']
];

// ── State ──
let grid = [];
let cursor = { row: 0, col: 0 };
let currentSort = 'alpha';
let lastResults = [];
const WORD_SET = new Set(WORD_DATA.map(({w}) => w));

// ── Tab switching ──
function switchTab(name) {
  const isGuess = name === 'Guess';
  document.getElementById('panelGuess').classList.toggle('active', isGuess);
  document.getElementById('panelResults').classList.toggle('active', !isGuess);
  document.getElementById('tabGuess').classList.toggle('active', isGuess);
  document.getElementById('tabResults').classList.toggle('active', !isGuess);
}

// ── Init ──
document.getElementById('wordCount').textContent = WORD_DATA.length.toLocaleString() + ' words';

function initGrid() {
  grid = Array.from({length: ROWS}, () =>
    Array.from({length: COLS}, () => ({ letter: '', state: 'empty' }))
  );
  cursor = { row: 0, col: 0 };
}

function buildGridDOM() {
  const container = document.getElementById('grid');
  container.innerHTML = '';
  for (let r = 0; r < ROWS; r++) {
    const row = document.createElement('div');
    row.className = 'grid-row';
    row.id = `row-${r}`;
    for (let c = 0; c < COLS; c++) {
      const tile = document.createElement('div');
      tile.className = 'tile';
      tile.dataset.row = r;
      tile.dataset.col = c;
      tile.dataset.state = 'empty';
      tile.addEventListener('click', onTileClick);
      row.appendChild(tile);
    }
    const del = document.createElement('button');
    del.className = 'row-delete';
    del.id = `del-${r}`;
    del.textContent = '✕';
    del.addEventListener('click', () => deleteRow(r));
    row.appendChild(del);
    container.appendChild(row);
  }
}

function buildKeyboard() {
  const kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  KB_ROWS.forEach(keys => {
    const row = document.createElement('div');
    row.className = 'kb-row';
    keys.forEach(k => {
      const btn = document.createElement('button');
      btn.className = 'kb-key' + (k === '↵' || k === '⌫' ? ' wide' : '');
      btn.textContent = k;
      btn.dataset.key = k;
      btn.dataset.ks = 'unused';
      btn.addEventListener('click', () => handleKey(k));
      row.appendChild(btn);
    });
    kb.appendChild(row);
  });
}

// ── Tile interaction ──
function onTileClick(e) {
  const r = +e.currentTarget.dataset.row;
  const c = +e.currentTarget.dataset.col;
  const cell = grid[r][c];
  if (!cell.letter) return;
  const cycle = { typing: 'grey', grey: 'yellow', yellow: 'green', green: 'grey' };
  cell.state = cycle[cell.state] || 'grey';
  renderTile(r, c);
}

function renderTile(r, c) {
  const cell = grid[r][c];
  const tile = document.querySelector(`.tile[data-row="${r}"][data-col="${c}"]`);
  tile.dataset.state = cell.state;
  tile.textContent = cell.letter.toUpperCase();
}

function updateDeleteBtn(r) {
  const btn = document.getElementById(`del-${r}`);
  if (!btn) return;
  const hasContent = r < cursor.row; // only submitted rows get delete
  btn.classList.toggle('has-content', hasContent);
}

// ── Keyboard input ──
function handleKey(key) {
  if (key === '⌫' || key === 'Backspace') deleteLetter();
  else if (key === '↵' || key === 'Enter') submitRow();
  else if (/^[a-zA-Z]$/.test(key)) typeLetter(key.toLowerCase());
}

function typeLetter(letter) {
  const row = cursor.row;
  if (row >= ROWS) return;
  const col = grid[row].findIndex(c => !c.letter);
  if (col === -1) return;
  grid[row][col].letter = letter;
  grid[row][col].state = 'typing';
  renderTile(row, col);
  cursor.col = col + 1;
}

function deleteLetter() {
  const row = cursor.row;
  if (row >= ROWS) return;
  let col = -1;
  for (let c = COLS - 1; c >= 0; c--) {
    if (grid[row][c].letter) { col = c; break; }
  }
  if (col === -1) return;
  grid[row][col].letter = '';
  grid[row][col].state = 'empty';
  renderTile(row, col);
  cursor.col = col;
}

function submitRow() {
  const row = cursor.row;
  if (row >= ROWS) return;
  if (!grid[row].every(c => c.letter)) return;

  const word = grid[row].map(c => c.letter).join('');
  if (!WORD_SET.has(word)) {
    const rowEl = document.getElementById(`row-${row}`);
    rowEl.classList.remove('row-shake');
    void rowEl.offsetWidth;
    rowEl.classList.add('row-shake');
    rowEl.addEventListener('animationend', () => rowEl.classList.remove('row-shake'), { once: true });
    return;
  }

  for (let c = 0; c < COLS; c++) {
    if (grid[row][c].state === 'typing') {
      grid[row][c].state = 'grey';
      renderTile(row, c);
    }
  }
  cursor.row++;
  cursor.col = 0;

  // Show delete button for submitted row
  updateDeleteBtn(row);

  runFilter();

  // Auto-switch to results on mobile
  if (window.innerWidth < 700) switchTab('Results');
}

function deleteRow(r) {
  if (r >= cursor.row) return;
  for (let row = r; row < cursor.row - 1; row++) {
    grid[row] = grid[row + 1].map(c => ({ ...c }));
  }
  grid[cursor.row - 1] = Array.from({length: COLS}, () => ({ letter: '', state: 'empty' }));
  cursor.row--;
  cursor.col = 0;
  for (let row = 0; row < ROWS; row++) {
    for (let c = 0; c < COLS; c++) renderTile(row, c);
    updateDeleteBtn(row);
  }
  updateKeyboard();
  cursor.row === 0 ? resetResults() : runFilter();
}

// Physical keyboard (desktop)
document.addEventListener('keydown', e => {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  handleKey(e.key);
});

// ── Filter ──
function runFilter() {
  const known = Array(5).fill('');
  const yellowMap = {};
  const excluded = new Set();
  const required = new Set();

  for (let r = 0; r < cursor.row; r++) {
    const row = grid[r];
    for (let c = 0; c < COLS; c++) {
      const { letter, state } = row[c];
      if (!letter) continue;
      if (state === 'green') {
        known[c] = letter; required.add(letter);
      } else if (state === 'yellow') {
        required.add(letter);
        if (!yellowMap[letter]) yellowMap[letter] = new Set();
        yellowMap[letter].add(c);
      } else if (state === 'grey') {
        const elsewhere = row.some((cell, ci) => ci !== c && cell.letter === letter && (cell.state === 'green' || cell.state === 'yellow'));
        if (!elsewhere) excluded.add(letter);
      }
    }
  }

  const results = WORD_DATA.filter(({w}) => {
    for (let i = 0; i < 5; i++) if (known[i] && w[i] !== known[i]) return false;
    for (const ch of required) if (!w.includes(ch)) return false;
    for (const [ch, positions] of Object.entries(yellowMap))
      for (const pos of positions) if (w[pos] === ch) return false;
    for (const ch of excluded) {
      if (required.has(ch)) continue;
      if (w.includes(ch)) return false;
    }
    return true;
  });

  lastResults = results;
  const topLetters = renderFrequency(results, known, Object.keys(yellowMap), [...excluded]);
  renderResults(results, known, Object.keys(yellowMap), topLetters);
  updateKeyboard();

  // Update badge
  const badge = document.getElementById('resultBadge');
  if (results.length > 0) {
    badge.textContent = results.length > 999 ? '999+' : results.length;
    badge.classList.add('visible');
  } else {
    badge.classList.remove('visible');
  }
}

// ── Render results ──
function renderResults(results, known = [], yellowLetters = [], topLetters = new Set()) {
  const sorted = sortWords(results);
  document.getElementById('resultNum').textContent = sorted.length.toLocaleString();
  document.getElementById('resultLabel').textContent = sorted.length === 1 ? ' word' : ' words';

  const wordGrid = document.getElementById('wordGrid');
  if (!sorted.length) {
    wordGrid.innerHTML = '<div class="empty-state"><span class="big">😶</span>No words match — check your tiles</div>';
    return;
  }

  const scored = sorted.map(entry => ({
    ...entry,
    topScore: [...new Set(entry.w)].filter(ch => topLetters.has(ch)).length
  }));
  const maxScore = scored.reduce((m, e) => Math.max(m, e.topScore), 0);
  const shouldHighlight = topLetters.size > 0 && maxScore >= 2;

  const MAX = 500;
  wordGrid.innerHTML = scored.slice(0, MAX).map(({w, p, topScore}, idx) => {
    const hl = shouldHighlight && topScore === maxScore;
    const letters = w.split('').map((ch, i) => {
      let cls = 'wl';
      if (known[i] === ch) cls += ' wg';
      else if (yellowLetters.includes(ch)) cls += ' wy';
      return `<span class="${cls}">${ch.toUpperCase()}</span>`;
    }).join('');
    return `<div class="word-chip${hl ? ' chip-highlight' : ''}" style="animation-delay:${Math.min(idx*5,160)}ms">
      <span class="word-letters">${letters}</span><span class="word-score">${p}pts</span>
    </div>`;
  }).join('');

  if (sorted.length > MAX) {
    wordGrid.innerHTML += `<div style="width:100%;padding:12px 0;color:var(--muted);font-size:11px;text-align:center">
      Showing ${MAX} of ${sorted.length.toLocaleString()} — add more guesses to narrow down
    </div>`;
  }
}

function sortWords(arr) {
  return [...arr].sort((a, b) =>
    currentSort === 'alpha' ? a.w.localeCompare(b.w) :
    currentSort === 'score-desc' ? b.p - a.p : a.p - b.p
  );
}

// ── Frequency ──
function renderFrequency(results, known, yellowLetters, excluded) {
  const panel = document.getElementById('freqPanel');
  const sub = document.getElementById('freqSub');
  if (!results.length) {
    panel.innerHTML = '<div class="freq-empty">No results</div>';
    sub.textContent = ''; return new Set();
  }
  const accountedFor = new Set([...known.filter(Boolean), ...yellowLetters, ...excluded]);
  const freq = {};
  for (const {w} of results) {
    const seen = new Set();
    for (const ch of w) {
      if (!accountedFor.has(ch) && !seen.has(ch)) {
        freq[ch] = (freq[ch] || 0) + 1; seen.add(ch);
      }
    }
  }
  const entries = Object.entries(freq).sort((a, b) => b[1] - a[1]);
  if (!entries.length) {
    panel.innerHTML = '<div class="freq-empty">All letters accounted for</div>';
    sub.textContent = ''; return new Set();
  }
  const topN = entries.slice(0, 10);
  const maxCount = topN[0][1];
  sub.textContent = `top ${topN.length} of ${entries.length} unused`;
  panel.innerHTML = topN.map(([letter, count], idx) => {
    const pct = Math.round((count / results.length) * 100);
    const barPct = Math.round((count / maxCount) * 100);
    const hue = Math.round(80 + (idx / Math.max(topN.length - 1, 1)) * 100);
    return `<div class="freq-row">
      <span class="freq-letter">${letter.toUpperCase()}</span>
      <div class="freq-bar-wrap"><div class="freq-bar" style="width:${barPct}%;background:hsl(${hue},90%,62%)"></div></div>
      <span class="freq-count">${count}</span>
      <span class="freq-pct">${pct}%</span>
    </div>`;
  }).join('');
  return new Set(topN.slice(0, 5).map(([l]) => l));
}

// ── Keyboard colours ──
function updateKeyboard() {
  const ls = {};
  const priority = { green: 3, yellow: 2, grey: 1 };
  for (let r = 0; r < ROWS; r++)
    for (let c = 0; c < COLS; c++) {
      const { letter, state } = grid[r][c];
      if (!letter || state === 'typing' || state === 'empty') continue;
      if (!ls[letter] || priority[state] > priority[ls[letter]]) ls[letter] = state;
    }
  document.querySelectorAll('.kb-key[data-key]').forEach(btn => {
    const k = btn.dataset.key.toLowerCase();
    if (k === '↵' || k === '⌫') return;
    btn.dataset.ks = ls[k] || 'unused';
  });
}

// ── Sort ──
function setSort(btn) {
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentSort = btn.dataset.sort;
  if (lastResults.length) runFilter();
}

// ── Reset ──
function resetResults() {
  lastResults = [];
  document.getElementById('wordGrid').innerHTML = '<div class="empty-state"><span class="big">🟩</span>Submit a guess to see matches</div>';
  document.getElementById('resultNum').textContent = '—';
  document.getElementById('resultLabel').textContent = ' words';
  document.getElementById('freqPanel').innerHTML = '<div class="freq-empty">Appears after first guess</div>';
  document.getElementById('freqSub').textContent = 'search first';
  document.getElementById('resultBadge').classList.remove('visible');
}

function resetAll() {
  initGrid();
  buildGridDOM();
  buildKeyboard();
  resetResults();
  if (window.innerWidth < 700) switchTab('Guess');
}

// ── Copy ──
function copyResults() {
  if (!lastResults.length) return;
  navigator.clipboard.writeText(sortWords(lastResults).map(({w}) => w.toUpperCase()).join('\n')).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Copied ✓';
    btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'Copy list'; btn.classList.remove('copied'); }, 2000);
  });
}

// ── Boot ──
initGrid();
buildGridDOM();
buildKeyboard();
</script>
</body>
